name: docker-publish

# Builds the Gramps Web AIO image for amd64 + arm64 and publishes to:
#   - GHCR  (always; uses the built-in GITHUB_TOKEN)
#   - Docker Hub (auto-enabled once DOCKERHUB_USERNAME + DOCKERHUB_TOKEN secrets exist)
#
# Add the Docker Hub secrets in: repo Settings > Secrets and variables > Actions
#   DOCKERHUB_USERNAME = devbrewery
#   DOCKERHUB_TOKEN    = <a Docker Hub access token with Read/Write/Delete>

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/dev-brewery/grampsweb-aio
  DOCKERHUB_IMAGE: devbrewery/grampsweb-aio

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # Mapped here because the `secrets` context is not allowed in a step `if:`,
      # but `env` is. Lets us conditionally enable Docker Hub when the token exists.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            name=${{ env.DOCKERHUB_IMAGE }},enable=${{ env.DOCKERHUB_TOKEN != '' }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
